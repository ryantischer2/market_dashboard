# Refresh dashboard data daily and commit so GitHub Pages serves updated JSON/charts.
name: Refresh dashboard data

on:
  schedule:
    # Pre-market: Mon–Fri 8:30 AM CST (13:30 UTC)
    - cron: '30 13 * * 1-5'
    # Midday: Mon–Fri 12:00 PM CST (17:00 UTC)
    - cron: '0 17 * * 1-5'
    # Post-close: Mon–Fri 3:30 PM CST (20:30 UTC)
    - cron: '30 20 * * 1-5'
  workflow_dispatch: # Allow manual run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update 200 DMA list
        run: |
          python scripts/update_200dma.py

      - name: Generate data
        run: |
          python scripts/build_data.py --out-dir data
        env:
          TZ: UTC

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: refresh dashboard data [automated]" && git push)
